# =============================================================================
# ORTHONOBA — Nginx Configuration
# app.orthonoba.app + n8n.orthonoba.app
# =============================================================================
# Include rate limiting zones (must be in http context — loaded by nginx.conf)
# This file lives in /etc/nginx/conf.d/ and is auto-included
# Rate limiting zones are defined in rate-limiting.conf
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (all vhosts)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name orthonoba.app *.orthonoba.app;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — app.orthonoba.app (main Next.js app)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.orthonoba.app orthonoba.app;

    # SSL Certificates (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/orthonoba.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orthonoba.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/orthonoba.app/chain.pem;

    # TLS configuration — TLSv1.2 + TLSv1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---------------------------------------------------------------------------
    # Security Headers
    # ---------------------------------------------------------------------------

    # HSTS — 1 year, includeSubDomains, preload-ready
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;

    # MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), usb=()" always;

    # Content Security Policy — strict but Next.js compatible
    # Note: 'unsafe-inline' required for Next.js inline scripts/styles in older versions.
    # Upgrade to nonce-based CSP when Next.js supports it fully.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://www.googletagmanager.com https://connect.facebook.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob: https:;
        connect-src 'self' https://api.stripe.com https://www.google-analytics.com https://region1.google-analytics.com wss:;
        frame-src 'self' https://js.stripe.com https://hooks.stripe.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
    " always;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # Brotli (if ngx_brotli module is available — comment out if not compiled in)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ---------------------------------------------------------------------------
    # Rate limiting — applied per location
    # ---------------------------------------------------------------------------

    # Auth endpoints — strict (5 req/min)
    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://app:3000;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # Stripe webhooks — higher tolerance
    location /api/v1/webhooks/stripe {
        limit_req zone=webhook burst=50 nodelay;
        limit_req_status 429;

        # Stripe sends raw body — disable proxy buffering
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_pass http://app:3000;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # General API — 30 req/min
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://app:3000;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # Next.js static assets — aggressive caching, no rate limit
    location /_next/static/ {
        proxy_pass http://app:3000;
        include /etc/nginx/conf.d/proxy-params.conf;

        # Cache immutable static assets (hashed filenames)
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary "Accept-Encoding";
    }

    # Public static files
    location /static/ {
        proxy_pass http://app:3000;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Everything else — proxied to Next.js
    location / {
        limit_req zone=global burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://app:3000;
        include /etc/nginx/conf.d/proxy-params.conf;

        # Cache-Control for HTML — no cache (SSR pages)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Error pages
    error_page 429 /429.html;
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — n8n.orthonoba.app
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name n8n.orthonoba.app;

    ssl_certificate     /etc/letsencrypt/live/orthonoba.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orthonoba.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/orthonoba.app/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # n8n — proxy with auth header pass-through
    location / {
        proxy_pass http://n8n:5678;
        include /etc/nginx/conf.d/proxy-params.conf;

        # Pass Authorization header through (n8n basic auth)
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        # WebSocket support for n8n real-time UI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
