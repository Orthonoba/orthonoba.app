# =============================================================================
# ORTHONOBA — Nginx Rate Limiting Zones
# =============================================================================
# This file MUST be included at the http{} block level, NOT inside a server{}.
# In a standard nginx setup, place this in /etc/nginx/conf.d/ and ensure
# nginx.conf has: include /etc/nginx/conf.d/*.conf; inside http{}
#
# If using a custom nginx.conf, add:
#   include /etc/nginx/conf.d/rate-limiting.conf;
# at the top of http{} — before any server{} blocks.
# =============================================================================

# ---------------------------------------------------------------------------
# Request rate zones (per client IP)
# ---------------------------------------------------------------------------

# General API — 30 requests/minute
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# Auth endpoints (login, logout, token refresh) — 5 requests/minute
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Webhooks (Stripe, Meta) — 100 requests/minute
limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/m;

# Global fallback — 60 requests/second (DDoS protection)
limit_req_zone $binary_remote_addr zone=global:10m rate=60r/s;

# ---------------------------------------------------------------------------
# Connection limit zones
# ---------------------------------------------------------------------------

# Max concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---------------------------------------------------------------------------
# Default burst / response configuration
# ---------------------------------------------------------------------------

# Log rate limit violations at warn level
limit_req_log_level warn;

# Return 429 Too Many Requests (not the default 503)
limit_req_status 429;
limit_conn_status 429;
