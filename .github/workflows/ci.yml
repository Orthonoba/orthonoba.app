name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: TypeScript + ESLint
  # ---------------------------------------------------------------------------
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — strict type check
        run: npx tsc --noEmit

      - name: ESLint
        # Use || true to treat as warning (remove once lint is clean)
        run: npm run lint || true

  # ---------------------------------------------------------------------------
  # Job 2: Production build verification
  # ---------------------------------------------------------------------------
  build:
    name: Build (Next.js standalone)
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Minimal stubs for build-time env validation
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Verify standalone output
        run: |
          test -d .next/standalone || (echo "ERROR: .next/standalone not found. Ensure next.config.ts has output: 'standalone'" && exit 1)
          test -f .next/standalone/server.js || (echo "ERROR: server.js missing from standalone output" && exit 1)
          echo "Standalone build verified"

      - name: Upload build artifacts (for deploy jobs)
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: |
            .next/
            public/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Docker build validation (does not push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build
    # Only run on main and staging branches, not every PR
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: orthonoba-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1
